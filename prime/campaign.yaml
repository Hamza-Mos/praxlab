name: prime-rl
description: >
  Build and iterate on RL environments for hosted training
  on Prime Intellect.

level: 1
mode: open_research

metric:
  name: eval_reward_mean
  direction: higher
  eval_command: "prime rl run configs/rl/*.toml"

budget:
  compute_usd: 0
  wall_hours: 0
  max_experiments: 0

editable:
  - "environments/**/*.py"
  - "configs/rl/*.toml"

forbidden:
  - program.md
