name: tinker-sl
description: >
  Improve model capabilities via supervised fine-tuning (SFT)
  using Tinker SDK.

level: 1
mode: open_research

metric:
  name: eval_loss
  direction: lower
  eval_command: "python train.py > run.log 2>&1"

budget:
  compute_usd: 10
  wall_hours: 0
  max_experiments: 0

editable:
  - train.py
  - data.jsonl

forbidden:
  - program.md
