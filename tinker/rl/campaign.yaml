name: tinker-rl
description: >
  Improve model capabilities via GRPO (Group Relative Policy Optimization)
  using Tinker SDK.

level: 1
mode: open_research

metric:
  name: eval_reward_mean
  direction: higher
  eval_command: "python train.py > run.log 2>&1"

budget:
  compute_usd: 10
  wall_hours: 0
  max_experiments: 0

editable:
  - train.py
  - reward.py
  - prompts.jsonl
  - eval_prompts.jsonl

forbidden:
  - program.md
