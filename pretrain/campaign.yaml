name: pretrain
description: >
  Minimize val_bpb on autoresearch GPT by modifying train.py.
  Fixed 5-minute training budget per experiment on Modal cloud GPU.

level: 1
mode: open_research

metric:
  name: val_bpb
  direction: lower
  eval_command: "modal run modal_run.py > run.log 2>&1"

budget:
  compute_usd: 0
  wall_hours: 0
  max_experiments: 0

editable:
  - train.py

forbidden:
  - prepare.py
  - modal_run.py
  - pyproject.toml
  - program.md
